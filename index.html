<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Girl 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to bottom, #ffe4ec, #ffd6e7);
    text-align: center;
    overflow: hidden;
}

h1 {
    margin: 10px;
    font-size: 32px;
    color: #ff4d88;
}

/* MUSIC BUTTON (SUDAH DI BAWAH) */
.music-btn {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,105,180,0.85);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 14px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.music-btn:hover {
    transform: translateX(-50%) scale(1.1);
}

/* SLIDER */
.slider-container {
    position: relative;
    width: 100%;
    height: 80vh;
    overflow: hidden;
}

.slider {
    display: flex;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.65, 0, 0.35, 1);
    touch-action: pan-y;
}

.slide {
    min-width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* FOTO FRAME */
.photo-frame {
    width: 75vw;
    aspect-ratio: 1 / 1;
    background: white;
    padding: 12px;
    border-radius: 10px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

.photo-frame img {
    width: 100%;
    height: 85%;
    object-fit: cover;
    border-radius: 5px;
    cursor: pointer;
}

.caption {
    margin-top: 8px;
    font-size: 14px;
    color: #555;
}

/* DOT */
.dots {
    position: absolute;
    bottom: 15px;
    width: 100%;
    text-align: center;
}

.dot {
    height: 10px;
    width: 10px;
    margin: 5px;
    background-color: #ffc0cb;
    border-radius: 50%;
    display: inline-block;
}

.active {
    background-color: #ff4d88;
    transform: scale(1.3);
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
}

.modal img {
    display: block;
    margin: auto;
    margin-top: 10%;
    width: 90%;
    max-width: 500px;
    border-radius: 20px;
}

/* EMOJI */
.emoji {
    position: fixed;
    font-size: 25px;
    opacity: 0.4;
    animation: float 12s linear infinite;
    pointer-events: none;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 0; }
    50% { opacity: 0.5; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>💗 My Girl 💗</h1>

<!-- MUSIC -->
<button class="music-btn" onclick="toggleMusic()">🎵 Play</button>
<audio id="music" loop>
    <source src="lagu.mp3" type="audio/mpeg">
</audio>

<div class="slider-container">
<div class="slider" id="slider"></div>
<div class="dots" id="dots"></div>
</div>

<div id="modal" class="modal" onclick="closeModal()">
<img id="modalImg">
</div>

<script>
const slider = document.getElementById("slider");
const dotsContainer = document.getElementById("dots");

/* FOTO */
for(let i=1;i<=10;i++){
    slider.innerHTML += `
    <div class="slide">
        <div class="photo-frame">
            <img src="foto${i}.jpg" onclick="openModal(this.src)">
            <div class="caption">My Girl 💗</div>
        </div>
    </div>`;
    
    const dot = document.createElement("span");
    dot.className = "dot";
    dot.onclick = ()=>{index=i-1;showSlide();}
    dotsContainer.appendChild(dot);
}

let index = 0;
const slides = document.querySelectorAll(".slide");

function updateDots(){
    document.querySelectorAll(".dot").forEach((d,i)=>{
        d.classList.toggle("active", i===index);
    });
}

function showSlide(){
    slider.style.transform = `translateX(-${index * 100}%)`;
    updateDots();
}

function nextSlide(){
    index = (index + 1) % slides.length;
    showSlide();
}

updateDots();

/* AUTO */
let autoSlide = setInterval(nextSlide, 3500);

/* SWIPE */
let startX=0,endX=0;

slider.addEventListener("touchstart", e=>{
    startX=e.touches[0].clientX;
    clearInterval(autoSlide);
});
slider.addEventListener("touchmove", e=>{
    endX=e.touches[0].clientX;
});
slider.addEventListener("touchend", ()=>{
    let diff=startX-endX;
    if(diff>50) nextSlide();
    else if(diff<-50){
        index = (index - 1 + slides.length) % slides.length;
        showSlide();
    }
});

/* MODAL */
function openModal(src){
    document.getElementById("modal").style.display="block";
    document.getElementById("modalImg").src=src;
}
function closeModal(){
    document.getElementById("modal").style.display="none";
}

/* MUSIC */
const music = document.getElementById("music");
function toggleMusic(){
    if(music.paused){
        music.play();
    } else {
        music.pause();
    }
}

/* EMOJI */
const emojis=["🌸","💞","💐"];
function createEmoji(){
    const e=document.createElement("div");
    e.className="emoji";
    e.innerText=emojis[Math.floor(Math.random()*emojis.length)];
    e.style.left=Math.random()*100+"vw";
    e.style.fontSize=(20+Math.random()*20)+"px";
    e.style.animationDuration=(8+Math.random()*5)+"s";
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),12000);
}
setInterval(createEmoji,600);
</script>

</body>
</html>
